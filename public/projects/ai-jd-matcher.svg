<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">AI JD Matcher cover</title>
  <desc id="desc">Abstract resume to job description AI matching tool.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#064e3b"/>
      <stop offset=".5" stop-color="#0e7490"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <circle cx="600" cy="360" r="280" fill="#ffffff" opacity=".04"/>
  <!-- Resume card left -->
  <rect x="90" y="160" width="360" height="400" rx="20" fill="#020617" opacity=".55" stroke="#34d399" stroke-opacity=".5" stroke-width="3"/>
  <rect x="130" y="210" width="160" height="16" rx="6" fill="#34d399" opacity=".7"/>
  <rect x="130" y="244" width="260" height="8" rx="4" fill="#ffffff" opacity=".2"/>
  <rect x="130" y="264" width="220" height="8" rx="4" fill="#ffffff" opacity=".2"/>
  <rect x="130" y="284" width="240" height="8" rx="4" fill="#ffffff" opacity=".15"/>
  <rect x="130" y="320" width="100" height="10" rx="5" fill="#34d399" opacity=".5"/>
  <rect x="130" y="346" width="270" height="7" rx="3" fill="#ffffff" opacity=".15"/>
  <rect x="130" y="366" width="230" height="7" rx="3" fill="#ffffff" opacity=".12"/>
  <rect x="130" y="386" width="250" height="7" rx="3" fill="#ffffff" opacity=".12"/>
  <rect x="130" y="426" width="100" height="10" rx="5" fill="#34d399" opacity=".5"/>
  <rect x="130" y="452" width="270" height="7" rx="3" fill="#ffffff" opacity=".12"/>
  <rect x="130" y="472" width="200" height="7" rx="3" fill="#ffffff" opacity=".1"/>
  <!-- JD card right -->
  <rect x="750" y="160" width="360" height="400" rx="20" fill="#020617" opacity=".55" stroke="#38bdf8" stroke-opacity=".5" stroke-width="3"/>
  <rect x="790" y="210" width="140" height="16" rx="6" fill="#38bdf8" opacity=".7"/>
  <rect x="790" y="244" width="280" height="8" rx="4" fill="#ffffff" opacity=".2"/>
  <rect x="790" y="264" width="240" height="8" rx="4" fill="#ffffff" opacity=".2"/>
  <rect x="790" y="284" width="260" height="8" rx="4" fill="#ffffff" opacity=".15"/>
  <rect x="790" y="320" width="120" height="10" rx="5" fill="#38bdf8" opacity=".5"/>
  <rect x="790" y="346" width="270" height="7" rx="3" fill="#ffffff" opacity=".15"/>
  <rect x="790" y="366" width="230" height="7" rx="3" fill="#ffffff" opacity=".12"/>
  <rect x="790" y="386" width="250" height="7" rx="3" fill="#ffffff" opacity=".12"/>
  <rect x="790" y="426" width="100" height="10" rx="5" fill="#38bdf8" opacity=".5"/>
  <rect x="790" y="452" width="270" height="7" rx="3" fill="#ffffff" opacity=".12"/>
  <rect x="790" y="472" width="200" height="7" rx="3" fill="#ffffff" opacity=".1"/>
  <!-- Center match score -->
  <circle cx="600" cy="360" r="90" fill="#020617" opacity=".8" stroke="#34d399" stroke-opacity=".6" stroke-width="3"/>
  <text x="600" y="348" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-weight="800" font-size="36" fill="#34d399">87%</text>
  <text x="600" y="382" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-weight="600" font-size="16" fill="#e0f2fe" opacity=".8">Match</text>
  <!-- Connecting lines -->
  <line x1="450" y1="360" x2="510" y2="360" stroke="#34d399" stroke-width="6" stroke-opacity=".6" stroke-linecap="round"/>
  <line x1="690" y1="360" x2="750" y2="360" stroke="#38bdf8" stroke-width="6" stroke-opacity=".6" stroke-linecap="round"/>
</svg>
