<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">RAG Document Assistant cover</title>
  <desc id="desc">Abstract RAG document assistant chatbot project.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#3b0764"/>
      <stop offset=".5" stop-color="#1e3a8a"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <circle cx="600" cy="360" r="300" fill="#ffffff" opacity=".04"/>
  <!-- PDF document icon -->
  <rect x="90" y="150" width="280" height="360" rx="16" fill="#020617" opacity=".6" stroke="#a78bfa" stroke-opacity=".5" stroke-width="3"/>
  <rect x="120" y="190" width="160" height="14" rx="6" fill="#a78bfa" opacity=".7"/>
  <rect x="120" y="218" width="220" height="7" rx="3" fill="#ffffff" opacity=".2"/>
  <rect x="120" y="234" width="190" height="7" rx="3" fill="#ffffff" opacity=".17"/>
  <rect x="120" y="250" width="210" height="7" rx="3" fill="#ffffff" opacity=".15"/>
  <rect x="120" y="274" width="130" height="10" rx="5" fill="#a78bfa" opacity=".5"/>
  <rect x="120" y="298" width="220" height="7" rx="3" fill="#ffffff" opacity=".15"/>
  <rect x="120" y="314" width="180" height="7" rx="3" fill="#ffffff" opacity=".12"/>
  <rect x="120" y="330" width="200" height="7" rx="3" fill="#ffffff" opacity=".12"/>
  <rect x="120" y="354" width="130" height="10" rx="5" fill="#a78bfa" opacity=".5"/>
  <rect x="120" y="378" width="220" height="7" rx="3" fill="#ffffff" opacity=".12"/>
  <rect x="120" y="394" width="170" height="7" rx="3" fill="#ffffff" opacity=".1"/>
  <text x="229" y="456" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-weight="800" font-size="18" fill="#a78bfa" opacity=".9">PDF</text>
  <!-- Vector store nodes -->
  <circle cx="540" cy="240" r="28" fill="#1e3a8a" opacity=".7" stroke="#818cf8" stroke-opacity=".6" stroke-width="2"/>
  <circle cx="540" cy="320" r="28" fill="#1e3a8a" opacity=".7" stroke="#818cf8" stroke-opacity=".5" stroke-width="2"/>
  <circle cx="540" cy="400" r="28" fill="#1e3a8a" opacity=".7" stroke="#818cf8" stroke-opacity=".5" stroke-width="2"/>
  <circle cx="540" cy="480" r="28" fill="#1e3a8a" opacity=".7" stroke="#818cf8" stroke-opacity=".5" stroke-width="2"/>
  <text x="540" y="247" text-anchor="middle" font-family="monospace" font-size="11" fill="#c7d2fe" opacity=".9">v1</text>
  <text x="540" y="327" text-anchor="middle" font-family="monospace" font-size="11" fill="#c7d2fe" opacity=".9">v2</text>
  <text x="540" y="407" text-anchor="middle" font-family="monospace" font-size="11" fill="#c7d2fe" opacity=".9">v3</text>
  <text x="540" y="487" text-anchor="middle" font-family="monospace" font-size="11" fill="#c7d2fe" opacity=".9">v4</text>
  <!-- Lines from PDF to vectors -->
  <line x1="370" y1="310" x2="510" y2="240" stroke="#a78bfa" stroke-width="2" stroke-opacity=".4"/>
  <line x1="370" y1="330" x2="510" y2="320" stroke="#a78bfa" stroke-width="2" stroke-opacity=".35"/>
  <line x1="370" y1="350" x2="510" y2="400" stroke="#a78bfa" stroke-width="2" stroke-opacity=".3"/>
  <line x1="370" y1="370" x2="510" y2="480" stroke="#a78bfa" stroke-width="2" stroke-opacity=".25"/>
  <!-- LLM orb center -->
  <circle cx="720" cy="360" r="80" fill="#020617" opacity=".8" stroke="#818cf8" stroke-opacity=".6" stroke-width="3"/>
  <text x="720" y="352" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-weight="800" font-size="18" fill="#818cf8">LLM</text>
  <text x="720" y="376" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="12" fill="#c7d2fe" opacity=".7">+ Context</text>
  <!-- Lines to LLM -->
  <line x1="568" y1="240" x2="660" y2="340" stroke="#818cf8" stroke-width="2" stroke-opacity=".4"/>
  <line x1="568" y1="320" x2="660" y2="350" stroke="#818cf8" stroke-width="2" stroke-opacity=".35"/>
  <line x1="568" y1="400" x2="660" y2="370" stroke="#818cf8" stroke-width="2" stroke-opacity=".3"/>
  <line x1="568" y1="480" x2="660" y2="380" stroke="#818cf8" stroke-width="2" stroke-opacity=".25"/>
  <!-- Chat bubbles right -->
  <rect x="840" y="195" width="270" height="60" rx="14" fill="#020617" opacity=".65" stroke="#38bdf8" stroke-opacity=".5" stroke-width="2"/>
  <text x="860" y="222" font-family="Inter,Arial,sans-serif" font-size="13" fill="#e0f2fe" opacity=".85">What does section 3 say?</text>
  <rect x="840" y="280" width="270" height="80" rx="14" fill="#1e3a8a" opacity=".65" stroke="#818cf8" stroke-opacity=".4" stroke-width="2"/>
  <text x="860" y="308" font-family="Inter,Arial,sans-serif" font-size="12" fill="#c7d2fe" opacity=".9">Section 3 describes the</text>
  <text x="860" y="328" font-family="Inter,Arial,sans-serif" font-size="12" fill="#c7d2fe" opacity=".9">selection criteria for...</text>
  <rect x="840" y="385" width="270" height="60" rx="14" fill="#020617" opacity=".65" stroke="#38bdf8" stroke-opacity=".45" stroke-width="2"/>
  <text x="860" y="412" font-family="Inter,Arial,sans-serif" font-size="13" fill="#e0f2fe" opacity=".85">Summarize the key skills.</text>
  <rect x="840" y="470" width="270" height="80" rx="14" fill="#1e3a8a" opacity=".65" stroke="#818cf8" stroke-opacity=".4" stroke-width="2"/>
  <text x="860" y="498" font-family="Inter,Arial,sans-serif" font-size="12" fill="#c7d2fe" opacity=".9">The key skills required</text>
  <text x="860" y="518" font-family="Inter,Arial,sans-serif" font-size="12" fill="#c7d2fe" opacity=".9">are Python, FastAPI...</text>
  <!-- Arrow from LLM to chat -->
  <line x1="800" y1="360" x2="838" y2="360" stroke="#38bdf8" stroke-width="4" stroke-opacity=".6" stroke-linecap="round"/>
</svg>
